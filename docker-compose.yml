# Serena MCP server — base compose
# Provides the server skeleton; projects are mounted via override.
#
# Start (with override):
#   docker compose -f docker-compose.yml -f docker-compose.projects.yml up -d
#
# MCP endpoint:      http://localhost:${SERENA_PORT:-9121}/mcp
# Web dashboard:     http://localhost:${SERENA_DASHBOARD_PORT:-24282}/dashboard

services:
  serena:
    image: ghcr.io/oraios/serena:latest
    container_name: seavista-serena
    ports:
      - "${SERENA_PORT:-9121}:9121"
      - "${SERENA_DASHBOARD_PORT:-24282}:24282"
    environment:
      - SERENA_DOCKER=1
    volumes:
      # Persist Serena config/session across restarts
      - serena-config:/workspaces/serena/config
      # Init scripts
      - ./init_config.py:/opt/serena-init/init_config.py:ro
      - ./prune_langs.py:/opt/serena-init/prune_langs.py:ro
      - ./sync_projects.py:/opt/serena-init/sync_projects.py:ro
      - ./works_in_container.json:/opt/serena-init/works_in_container.json:ro
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo "=== [1/3] Writing global config (external .serena storage) ==="
        python3 /opt/serena-init/init_config.py

        echo "=== [2/3] Registering projects (may take a minute for large repos) ==="
        # Register each mounted directory as a Serena project.
        # Let Serena auto-detect languages (yes y accepts all), then prune
        # languages without runtimes in the container (powershell, elixir, etc.).
        count=0
        for d in /workspace/*/; do
          if [ -d "$$d" ]; then
            name=$$(basename "$$d")
            if [ ! -f "/workspaces/serena/config/projects/$$name/.serena/project.yml" ]; then
              echo "  >> Registering $$name ..."
              yes y | serena project create "$$d" 2>&1 || echo "  !! $$name registration failed (will retry on next start)"
              # Prune languages without runtimes from the generated project.yml
              python3 /opt/serena-init/prune_langs.py "/workspaces/serena/config/projects/$$name/.serena/project.yml" /opt/serena-init/works_in_container.json || true
            else
              echo "  >> Skipping $$name (already registered)"
            fi
            count=$$((count + 1))
          fi
        done
        echo "  [$$count projects found in /workspace/]"

        echo "=== [2.5/3] Syncing projects list in global config ==="
        # Ensure all on-disk projects are in the global config's projects list.
        # init_config.py preserves the list on restart, but serena project create
        # may not have added new projects to it. This step bridges the gap.
        python3 /opt/serena-init/sync_projects.py

        echo "=== [3/3] Starting MCP server ==="
        # Start MCP server with query-projects mode for project discovery tools
        serena start-mcp-server --transport streamable-http --port 9121 --host 0.0.0.0 --mode query-projects
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',9121)); s.close()\"" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  serena-config:
