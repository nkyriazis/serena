# Serena MCP server — project mounts override
# Mounts the Seavista workspace (multiple repos) read-only for Serena to index.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.projects.yml up -d

services:
  serena:
    volumes:
      # Base config volume (inherited from base compose)
      - serena-config:/workspaces/serena/config
      # Mount projects under /workspace/ (read-only)
      # .serena data stored externally via project_serena_folder_location in global config.
      # External path: /workspaces/serena/config/projects/<folder_name>/.serena/
      # All project metadata and indexes persist in the serena-config volume.
      - ../seavista-core:/workspace/seavista-core:ro
      - ../seavista-simulator:/workspace/seavista-simulator:ro
      - ../seavista-triton:/workspace/seavista-triton:ro
      - ../seavista-ops-view:/workspace/seavista-ops-view:ro
      - ../seavista-ops-relay:/workspace/seavista-ops-relay:ro
      - ../seavista-ops-awareness:/workspace/seavista-ops-awareness:ro
      - ../seavista-ray-orchestrator:/workspace/seavista-ray-orchestrator:ro
      - ../seavista-tracklets:/workspace/seavista-tracklets:ro
      - ../seavista-seq2seq:/workspace/seavista-seq2seq:ro
      - ../Seavista_Layers:/workspace/Seavista_Layers:ro
      # Add/remove projects as needed
